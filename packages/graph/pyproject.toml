[project]
name = "dialectica-graph"
version = "1.0.0"
description = "DIALECTICA Graph Database Abstraction — Spanner Graph + Neo4j + FalkorDB clients"
license = "Apache-2.0"
requires-python = ">=3.12"
authors = [{ name = "TACITUS", email = "team@tacitus.ai" }]
dependencies = [
    "dialectica-ontology",
    "neo4j>=5.24",
    "google-cloud-spanner>=3.48",
    "google-cloud-aiplatform>=1.68",
    "anyio>=4.6",
]

[project.optional-dependencies]
falkordb = ["falkordb>=1.3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dialectica_graph"]
