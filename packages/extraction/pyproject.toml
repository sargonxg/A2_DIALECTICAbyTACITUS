[project]
name = "dialectica-extraction"
version = "1.0.0"
description = "DIALECTICA Extraction Pipeline — Gemini + GLiNER + LangGraph + Instructor for conflict entity extraction"
license = "Apache-2.0"
requires-python = ">=3.12"
authors = [{ name = "TACITUS", email = "team@tacitus.ai" }]
dependencies = [
    "dialectica-ontology",
    "dialectica-graph",
    "gliner>=0.2.25",
    "instructor>=1.7",
    "google-cloud-aiplatform>=1.70",
    "langchain-text-splitters>=0.3",
    "langgraph>=0.2",
    "litellm>=1.50",
    "pypdf>=4.3",
    "python-docx>=1.1",
    "httpx>=0.27",
    "tenacity>=9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dialectica_extraction"]
