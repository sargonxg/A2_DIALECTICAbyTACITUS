[project]
name = "dialectica-mcp"
version = "1.0.0"
description = "DIALECTICA MCP Server — Conflict intelligence tools for LLMs"
license = "Apache-2.0"
requires-python = ">=3.12"
authors = [{ name = "TACITUS", email = "team@tacitus.ai" }]
dependencies = [
    "mcp>=1.3",
    "dialectica-ontology",
    "dialectica-graph",
    "dialectica-reasoning",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dialectica_mcp"]
