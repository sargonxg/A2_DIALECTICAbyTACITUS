[project]
name = "dialectica-reasoning"
version = "1.0.0"
description = "DIALECTICA Reasoning Layer — GraphRAG + Symbolic Rule Engine + AI Agents"
license = "Apache-2.0"
requires-python = ">=3.12"
authors = [{ name = "TACITUS", email = "team@tacitus.ai" }]
dependencies = [
    "dialectica-ontology",
    "dialectica-graph",
    "dialectica-extraction",
    "google-cloud-aiplatform>=1.68",
    "langgraph>=0.2",
    "langchain-google-vertexai>=2.0",
    "langchain-community>=0.3",
    "networkx>=3.3",
    "python-louvain>=0.16",
    "numpy>=2.1",
]

[project.optional-dependencies]
kge = [
    "torch>=2.4",
    "torch-geometric>=2.6",
    "pykeen>=1.11",
    "leidenalg>=0.10",
    "igraph>=0.11",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dialectica_reasoning"]
