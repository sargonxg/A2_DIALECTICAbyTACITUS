[tool.poetry]
name = "dialectica-ontology"
version = "2.0.1"
description = "TACITUS Agentic Conflict Ontology (ACO) v2.0 — Graph-native ontology for conflict modeling"
authors = ["TACITUS <team@tacitus.ai>"]
license = "Apache-2.0"
readme = "README.md"
packages = [{include = "dialectica_ontology", from = "src"}]
keywords = [
    "conflict",
    "ontology",
    "graph",
    "negotiation",
    "peacebuilding",
    "pydantic",
    "knowledge-graph",
    "neurosymbolic",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]

[tool.poetry.urls]
homepage = "https://tacitus.me"
repository = "https://github.com/sargonxg/dialectica"

[tool.poetry.dependencies]
python = "^3.11"
pydantic = "^2.8.0"
python-ulid = "^3.0.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.3.0"
pytest-asyncio = "^0.24.0"
ruff = "^0.6.0"
mypy = "^1.11.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
