[project]
name = "dialectica-ontology"
version = "2.0.1"
description = "TACITUS Agentic Conflict Ontology (ACO) v2.0 — Graph-native ontology for conflict modeling"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
authors = [{ name = "TACITUS", email = "team@tacitus.ai" }]
keywords = [
    "conflict",
    "ontology",
    "graph",
    "negotiation",
    "peacebuilding",
    "pydantic",
    "knowledge-graph",
    "neurosymbolic",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.9,<3",
    "python-ulid>=3.0",
]

[project.urls]
Homepage = "https://tacitus.me"
Repository = "https://github.com/sargonxg/dialectica"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dialectica_ontology"]
