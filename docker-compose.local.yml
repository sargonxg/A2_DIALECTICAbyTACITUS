# Minimal local dev stack: Neo4j + Redis + API
# Usage: docker compose -f docker-compose.local.yml up --build
# Or:    make dev-local
version: "3.9"

services:
  neo4j:
    image: neo4j:5-community
    container_name: dialectica-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/dialectica-dev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "dialectica-dev", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: dialectica-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: dialectica-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dialectica
      POSTGRES_PASSWORD: dialectica-dev
      POSTGRES_DB: dialectica
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dialectica -d dialectica"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: dialectica-api
    ports:
      - "8080:8080"
    depends_on:
      neo4j: { condition: service_healthy }
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    environment:
      GRAPH_BACKEND: neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: dialectica-dev
      NEO4J_DATABASE: neo4j
      REDIS_URL: redis://redis:6379
      RATE_LIMIT_BACKEND: redis
      ENVIRONMENT: development
      ADMIN_API_KEY: dev-admin-key-local
      CORS_ORIGINS: "*"
      LOG_LEVEL: INFO
      GCP_PROJECT_ID: local-project
      DATABASE_URL: postgresql+asyncpg://dialectica:dialectica-dev@postgres:5432/dialectica
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  neo4j-data:
  postgres-data:
