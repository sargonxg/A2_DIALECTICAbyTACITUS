name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-packages --no-dev
      - run: uv run ruff check packages/
      - run: uv run ruff format --check packages/

  test-ontology:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-packages
      - run: uv run pytest packages/ontology/tests/ -v --tb=short -x

  test-api:
    runs-on: ubuntu-latest
    needs: test-ontology
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-packages
      - run: uv run pytest packages/api/tests/test_api.py -v --tb=short -x

  test-extraction:
    runs-on: ubuntu-latest
    needs: test-ontology
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-packages
      - run: uv run pytest packages/extraction/tests/ -v --tb=short -x

  test-reasoning:
    runs-on: ubuntu-latest
    needs: test-ontology
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-packages
      - run: uv run pytest packages/reasoning/tests/ -v --tb=short -x

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd apps/web && npm ci && npm run typecheck
