name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check packages/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install mypy
          pip install -e packages/ontology -e packages/graph -e packages/extraction -e packages/reasoning -e packages/api
      - run: mypy packages/ --ignore-missing-imports

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install pytest pytest-asyncio pytest-cov
          pip install -e packages/ontology -e packages/graph -e packages/extraction -e packages/reasoning -e packages/api
      - run: pytest packages/ -v --tb=short -m "not integration"

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd apps/web && npm ci
      - run: cd apps/web && npm run build
      - run: cd apps/web && npm test

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t dialectica-api -f packages/api/Dockerfile .
      - run: docker build -t dialectica-web -f apps/web/Dockerfile apps/web/
