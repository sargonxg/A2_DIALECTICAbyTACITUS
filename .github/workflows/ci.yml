name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ─── Path Filtering ─────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      ontology: ${{ steps.filter.outputs.ontology }}
      graph: ${{ steps.filter.outputs.graph }}
      extraction: ${{ steps.filter.outputs.extraction }}
      reasoning: ${{ steps.filter.outputs.reasoning }}
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ontology:
              - packages/ontology/**
            graph:
              - packages/graph/**
              - packages/ontology/**
            extraction:
              - packages/extraction/**
              - packages/ontology/**
              - packages/graph/**
            reasoning:
              - packages/reasoning/**
              - packages/ontology/**
              - packages/graph/**
              - packages/extraction/**
            api:
              - packages/api/**
              - packages/**
            web:
              - apps/web/**
            infra:
              - infrastructure/**
              - docker-compose.yml

  # ─── Python Lint ────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --all-packages
      - run: uv run ruff check packages/
      - run: uv run ruff format packages/ --check
      - run: uv run mypy packages/ --ignore-missing-imports
        continue-on-error: true

  # ─── Package Tests (cascading dependencies) ─────────────────────────────
  test-ontology:
    needs: [changes, lint]
    if: needs.changes.outputs.ontology == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --all-packages
      - run: uv run pytest packages/ontology/tests/ -x -v --tb=short

  test-graph:
    needs: [changes, lint]
    if: needs.changes.outputs.graph == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --all-packages
      - run: uv run pytest packages/graph/tests/ -x -v --tb=short

  test-extraction:
    needs: [changes, lint]
    if: needs.changes.outputs.extraction == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --all-packages
      - run: uv run pytest packages/extraction/tests/ -x -v --tb=short

  test-reasoning:
    needs: [changes, lint]
    if: needs.changes.outputs.reasoning == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --all-packages
      - run: uv run pytest packages/reasoning/tests/ -x -v --tb=short

  test-api:
    needs: [changes, lint]
    if: needs.changes.outputs.api == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --all-packages
      - run: uv run pytest packages/api/tests/ -x -v --tb=short
        env:
          ENVIRONMENT: development
          RATE_LIMIT_BACKEND: memory

  # ─── Frontend ───────────────────────────────────────────────────────────
  frontend:
    needs: [changes]
    if: needs.changes.outputs.web == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx next lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  # ─── Integration Tests ─────────────────────────────────────────────────
  integration:
    needs: [test-ontology, test-graph, test-extraction, test-reasoning, test-api]
    if: always() && github.event_name == 'push'
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s
      qdrant:
        image: qdrant/qdrant:v1.15.4
        ports: ["6333:6333", "6334:6334"]
      falkordb:
        image: falkordb/falkordb:latest
        ports: ["6380:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --all-packages
      - run: uv run pytest tests/integration/ -x -m integration --tb=short
        env:
          REDIS_URL: redis://localhost:6379
          FALKORDB_HOST: localhost
          FALKORDB_PORT: "6380"

  # ─── Docker Build Check ────────────────────────────────────────────────
  docker-build:
    needs: [lint]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          push: false
          tags: dialectica/api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build extraction worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/extraction/Dockerfile
          push: false
          tags: dialectica/extraction-worker:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
