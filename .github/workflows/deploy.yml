name: Deploy to GCP

on:
  push:
    branches: [main]
    tags:
      - "v*"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION || 'us-east1' }}
  ARTIFACT_REGISTRY: ${{ vars.GCP_REGION || 'us-east1' }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/dialectica

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud via Workload Identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── Determine image tag ────────────────────────────────────────────
      - name: Set image tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "IMAGE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_TAG=latest-$(echo $GITHUB_SHA | head -c8)" >> $GITHUB_OUTPUT
          fi

      # ─── Build and push API image ───────────────────────────────────────
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          push: true
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/api:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.ARTIFACT_REGISTRY }}/api:latest
          cache-from: type=registry,ref=${{ env.ARTIFACT_REGISTRY }}/api:buildcache
          cache-to: type=registry,ref=${{ env.ARTIFACT_REGISTRY }}/api:buildcache,mode=max
          provenance: false

      # ─── Build and push Web image ───────────────────────────────────────
      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/web:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.ARTIFACT_REGISTRY }}/web:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://api-${{ vars.CLOUD_RUN_DOMAIN }}
          cache-from: type=registry,ref=${{ env.ARTIFACT_REGISTRY }}/web:buildcache
          cache-to: type=registry,ref=${{ env.ARTIFACT_REGISTRY }}/web:buildcache,mode=max
          provenance: false

      # ─── Deploy API to Cloud Run ────────────────────────────────────────
      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy dialectica-api \
            --image ${{ env.ARTIFACT_REGISTRY }}/api:${{ steps.tag.outputs.IMAGE_TAG }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --platform managed \
            --no-allow-unauthenticated \
            --service-account dialectica-api@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }} \
            --set-env-vars SPANNER_INSTANCE_ID=dialectica-graph \
            --set-env-vars SPANNER_DATABASE_ID=dialectica \
            --set-env-vars VERTEX_AI_LOCATION=${{ env.GCP_REGION }} \
            --set-env-vars GRAPH_BACKEND=spanner \
            --set-secrets ADMIN_API_KEY=ADMIN_API_KEY:latest \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 10 \
            --timeout 300 \
            --port 8080 \
            --quiet

      # ─── Deploy Web to Cloud Run ────────────────────────────────────────
      - name: Get API URL
        id: api-url
        run: |
          API_URL=$(gcloud run services describe dialectica-api \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          echo "API_URL=$API_URL" >> $GITHUB_OUTPUT

      - name: Deploy Web to Cloud Run
        run: |
          gcloud run deploy dialectica-web \
            --image ${{ env.ARTIFACT_REGISTRY }}/web:${{ steps.tag.outputs.IMAGE_TAG }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars NEXT_PUBLIC_API_URL=${{ steps.api-url.outputs.API_URL }} \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --port 3000 \
            --quiet

      # ─── Post-deployment verification ──────────────────────────────────
      - name: Verify API health
        run: |
          API_URL=${{ steps.api-url.outputs.API_URL }}
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health")
            if [ "$STATUS" = "200" ]; then
              echo "API health check passed (status $STATUS)"
              exit 0
            fi
            echo "Attempt $i: Status $STATUS, retrying..."
            sleep 10
          done
          echo "API health check failed after 5 attempts"
          exit 1

      - name: Output deployment URLs
        run: |
          WEB_URL=$(gcloud run services describe dialectica-web \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          echo "### Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **API**: ${{ steps.api-url.outputs.API_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Web**: $WEB_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: ${{ steps.tag.outputs.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
