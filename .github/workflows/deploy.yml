name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGION: us-east1

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet
      - run: |
          REGISTRY="${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/dialectica"
          docker build -t ${REGISTRY}/api:${{ github.sha }} -f packages/api/Dockerfile .
          docker push ${REGISTRY}/api:${{ github.sha }}
          docker build -t ${REGISTRY}/web:${{ github.sha }} -f apps/web/Dockerfile apps/web/
          docker push ${REGISTRY}/web:${{ github.sha }}
          gcloud run deploy dialectica-api --image ${REGISTRY}/api:${{ github.sha }} --region ${REGION}
          gcloud run deploy dialectica-web --image ${REGISTRY}/web:${{ github.sha }} --region ${REGION}
      - run: |
          API_URL=$(gcloud run services describe dialectica-api --region ${REGION} --format 'value(status.url)')
          curl -sf "${API_URL}/health" || exit 1
