image:
  repository: falkordb/falkordb
  tag: latest
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: "250m"
    memory: "1Gi"
  limits:
    cpu: "1"
    memory: "4Gi"

persistence:
  enabled: true
  storageClass: premium-rwo
  size: 4Gi

service:
  type: ClusterIP
  port: 6379

livenessProbe:
  exec:
    command: ["redis-cli", "ping"]
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  exec:
    command: ["redis-cli", "ping"]
  initialDelaySeconds: 5
  periodSeconds: 5
