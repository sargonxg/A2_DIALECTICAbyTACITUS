image:
  repository: redis
  tag: 7-alpine
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: "100m"
    memory: "64Mi"
  limits:
    cpu: "500m"
    memory: "128Mi"

command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]

service:
  type: ClusterIP
  port: 6379

livenessProbe:
  exec:
    command: ["redis-cli", "ping"]
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  exec:
    command: ["redis-cli", "ping"]
  initialDelaySeconds: 3
  periodSeconds: 5
