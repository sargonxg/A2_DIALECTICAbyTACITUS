apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: dialectica-mcp-server
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "4"
    spec:
      containerConcurrency: 40
      timeoutSeconds: 120
      containers:
        - image: REGISTRY/mcp-server:TAG
          ports:
            - containerPort: 8090
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
